<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse.Tech - Innovative Solutions for Your Business</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars-container">
        <canvas id="starsCanvas"></canvas>
    </div>
    
    <header class="header">
        <div class="container">
            <div class="logo">
                <span class="logo-symbol">)</span>
                <span class="logo-text">Eclipse.Tech</span>
            </div>
            <nav class="nav">
                <a href="#features" class="nav-link">Features</a>
                <a href="#pricing" class="nav-link">Pricing</a>
                <a href="#blog" class="nav-link">Blog</a>
                <a href="#contact" class="nav-link">Contact</a>
            </nav>
            <button class="contact-btn">Contact us</button>
        </div>
    </header>

    <main class="main">
        <section class="hero">
            <div class="container">
                <h1 class="hero-title">
                    Innovative Solutions<br>
                    for Your Business
                </h1>
                <p class="hero-subtitle">
                    Cutting-edge services to accelerate growth,<br>
                    optimize processes, and take you to the next level
                </p>
                <button class="cta-button">Boost Your Business</button>
            </div>
        </section>

        <section class="companies">
            <div class="container">
                <div class="company-logos">
                    <div class="logo-item">
                        <span class="company-logo">airbnb</span>
                    </div>
                    <div class="logo-item">
                        <span class="company-logo">Creative<br>Market</span>
                    </div>
                    <div class="logo-item">
                        <span class="company-logo">shopify</span>
                    </div>
                    <div class="logo-item">
                        <span class="company-logo">amazon</span>
                    </div>
                    <div class="logo-item">
                        <span class="company-logo">airbnb</span>
                    </div>
                    <div class="logo-item">
                        <span class="company-logo">Google</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
